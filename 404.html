<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found – Fridays</title>
    <!-- Open Graph tags for link previews on /join/{code} paths (shown before JS redirect) -->
    <meta property="og:title" content="Join a group on Fridays! 🕺" />
    <meta property="og:description" content="Open in Fridays to join the group and share your weekly song pick." />
    <meta property="og:image" content="https://fridays.music/og-image.png" />
    <meta property="og:type" content="website" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .tagline {
            font-size: 16px;
            color: #888888;
            margin-bottom: 48px;
        }

        .error-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 32px;
        }

        .error-code {
            font-size: 56px;
            font-weight: 700;
            color: #333333;
            letter-spacing: -2px;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-subtitle {
            font-size: 15px;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .home-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .home-btn:hover { opacity: 0.85; }
    </style>
    <script>
        (function () {
            // GitHub Pages serves this file for any path that doesn't have a real file.
            // Intercept /join/{code} routes and forward to join/index.html with ?code=
            var path = window.location.pathname; // e.g. "/join/ABCD1234"

            if (/^\/join\/.+/.test(path)) {
                // Redirect to /join/?code={code} so join/index.html can read it
                var parts = path.split("/").filter(Boolean); // ["join", "ABCD1234"]
                var code  = parts[1] || "";
                window.location.replace(
                    "/join/?code=" + encodeURIComponent(code)
                );
            }
            // All other paths fall through and render the error page below
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">Fridays</div>
        <div class="tagline">Share your music.</div>

        <div class="error-card">
            <div class="error-code">404</div>
            <div class="error-title">This page doesn't exist.</div>
            <div class="error-subtitle">
                The link may be broken or the page may have been removed.
            </div>
            <a class="home-btn" href="/">Go home</a>
        </div>
    </div>
</body>
</html>
