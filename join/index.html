<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Fridays Group</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .tagline {
            font-size: 16px;
            color: #888888;
            margin-bottom: 48px;
        }

        .invite-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 32px;
        }

        .invite-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .invite-subtitle {
            font-size: 15px;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .code-badge {
            display: inline-block;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .open-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .open-btn:hover { opacity: 0.85; }

        .appstore-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #aaaaaa;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .appstore-btn:hover { border-color: #555555; color: #ffffff; }

        .status-msg {
            font-size: 14px;
            color: #666666;
            margin-top: 24px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Fridays</div>

        <div class="invite-card">
            <div class="invite-title">You're invited!</div>
            <div class="invite-subtitle">Someone shared a group invite with you.</div>

            <!-- JS populates this with the extracted join code -->
            <div class="code-badge" id="code-badge">...</div>

            <a class="open-btn" id="open-btn" href="#">Open in Fridays</a>
            <a class="appstore-btn"
               href="https://apps.apple.com/app/id6757407973"
               id="appstore-btn">
               Get Fridays on the App Store
            </a>
        </div>

        <div class="status-msg" id="status-msg">Opening Fridays…</div>
    </div>

    <script>
        (function () {
            // Extract the join code from the URL path: /join/{code}
            // pathParts example: ["", "join", "ABCD1234"]
            var pathParts = window.location.pathname.split("/").filter(Boolean);
            // pathParts[0] === "join", pathParts[1] === code
            var code = (pathParts[1] || "").toUpperCase();

            var codeBadge  = document.getElementById("code-badge");
            var openBtn    = document.getElementById("open-btn");
            var statusMsg  = document.getElementById("status-msg");

            if (code) {
                codeBadge.textContent = code;
                openBtn.href = "fridays://join/" + code;
            } else {
                codeBadge.textContent = "—";
                statusMsg.textContent = "Invalid invite link.";
                openBtn.style.display = "none";
            }

            if (!code) return;

            // Attempt to open the app via custom scheme.
            // If the app is not installed, nothing happens and we show the fallback.
            var appUrl = "fridays://join/" + code;

            // Small delay so the page renders before the URL redirect dialog
            setTimeout(function () {
                window.location.href = appUrl;
            }, 100);

            // After 1.5 s, if we're still here the app didn't open — show fallback hint
            setTimeout(function () {
                statusMsg.textContent =
                    "App not installed? Download Fridays from the App Store.";
            }, 1500);
        })();
    </script>
</body>
</html>
