<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Static OG tags — crawlers (iMessage, WhatsApp, etc.) read raw HTML and never run JS -->
    <title>You're invited to join a group on Fridays</title>
    <!-- Open Graph tags for iMessage / WhatsApp / Twitter link previews -->
    <meta property="og:title" content="You're invited to join a group on Fridays 🎵" />
    <meta property="og:description" content="Open in Fridays to join the group and share your weekly song pick." />
    <meta property="og:image" content="https://fridays.music/og-image.png" />
    <meta property="og:url" content="https://fridays.music/join" />
    <meta property="og:type" content="website" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .tagline {
            font-size: 16px;
            color: #888888;
            margin-bottom: 48px;
        }

        .invite-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 32px;
        }

        .invite-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .invite-subtitle {
            font-size: 15px;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .code-badge {
            display: inline-block;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .open-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .open-btn:hover { opacity: 0.85; }

        .appstore-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #aaaaaa;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .appstore-btn:hover { border-color: #555555; color: #ffffff; }

        .status-msg {
            font-size: 14px;
            color: #666666;
            margin-top: 24px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Fridays</div>

        <div class="invite-card">
            <!-- invite-title and invite-subtitle are updated by JS with the group name -->
            <div class="invite-title" id="invite-title">You're invited!</div>
            <div class="invite-subtitle" id="invite-subtitle">
                You've been invited to join a group on Fridays.
            </div>

            <!-- JS populates this with the extracted join code -->
            <div class="code-badge" id="code-badge">...</div>

            <a class="open-btn" id="open-btn" href="#">Open in Fridays</a>
            <a class="appstore-btn"
               href="https://apps.apple.com/app/id6757407973"
               id="appstore-btn">
               Get Fridays on the App Store
            </a>
        </div>

        <div class="status-msg" id="status-msg">Opening Fridays…</div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);

            // Extract join code. Two sources in priority order:
            // 1. ?code= query param — set by 404.html when GitHub Pages catches /join/{code}
            // 2. Path segment — works when accessed directly at /join/{code}
            var fromQuery = params.get("code") || "";
            var pathParts = window.location.pathname.split("/").filter(Boolean);
            // pathParts[0]==="join", pathParts[1]===code (direct path fallback)
            var fromPath = pathParts[1] || "";
            var code = (fromQuery || fromPath).toUpperCase();

            // --- Populate code badge and deep link button ---
            var codeBadge = document.getElementById("code-badge");
            var openBtn   = document.getElementById("open-btn");
            var statusMsg = document.getElementById("status-msg");

            if (code) {
                codeBadge.textContent = code;
                // Deep link carries the code so the app can pre-fill the join sheet
                openBtn.href = "fridays://join/" + code;
            } else {
                codeBadge.textContent = "—";
                statusMsg.textContent = "Invalid invite link.";
                openBtn.style.display = "none";
            }

            if (!code) return;

            // Attempt to open the app via custom URL scheme.
            // If the app is not installed, the redirect silently fails
            // and the App Store button acts as the fallback.
            var appUrl = "fridays://join/" + code;

            // Small delay so the page renders before the URL redirect dialog
            setTimeout(function () {
                window.location.href = appUrl;
            }, 100);

            // After 1.5 s, if we're still here the app didn't open — show hint
            setTimeout(function () {
                statusMsg.textContent =
                    "App not installed? Download Fridays from the App Store.";
            }, 1500);
        })();
    </script>
</body>
</html>
